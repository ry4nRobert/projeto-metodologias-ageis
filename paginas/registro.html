<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/estilos/loginstyle.css">
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    <title>Oficina registro</title>
</head>

<body>
    <main class="container">
        <form action="">
            <h1>Registro</h1>
            <div class="input-box">
                <input placeholder="Usuário" type="name">
                <i class="bx bxs-user"></i>
            </div>

            <div class="input-box">
                <input placeholder="E-mail" type="email">
                <i class="bx bxs-user"></i>
            </div>
            <div class="input-box">
                <input placeholder="Senha" type="password">
                <i class="bx bxs-lock-alt"></i>
            </div>

            <button type="submit" class="login">Registrar</button>

            <div class="register-link">
                <p>Já tem uma conta? <a href="/paginas/login.html">Faça login</a></p>
            </div>
        </form>
    </main>

</body>

</html>
